apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshmart
  namespace: freshmart
  labels:
    app: freshmart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: freshmart
  template:
    metadata:
      labels:
        app: freshmart
    spec:
      containers:
            - name: freshmart
        image: ${IMAGE_REPO}:${TAG}
        imagePullPolicy: IfNotPresent
        ports:
                - containerPort: 8000
        env:
                - name: UPI_ID
          valueFrom:
            configMapKeyRef:
              name: freshmart-config
              key: UPI_ID
                - name: UPI_NAME
          valueFrom:
            configMapKeyRef:
              name: freshmart-config
              key: UPI_NAME
                - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: freshmart-secret
              key: ADMIN_PASSWORD
                - name: FLASK_SECRET
          valueFrom:
            secretKeyRef:
              name: freshmart-secret
              key: FLASK_SECRET
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"