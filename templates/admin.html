<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin - Products</title>
<style>body{font-family:Arial;margin:20px;background:#f4f4f4}.box{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}a,button{font-size:14px}.btn{padding:6px 10px;border:none;border-radius:4px;cursor:pointer;text-decoration:none;display:inline-block}.btn-primary{background:#007bff;color:#fff}.btn-danger{background:#dc3545;color:#fff}.btn-light{background:#f1f1f1}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}</style></head>
<body><div class="box">
<div class="top"><h2>Products</h2><div><a class="btn btn-light" href="{{ url_for('admin_orders') }}">Orders</a> <a class="btn btn-light" href="{{ url_for('admin_logout') }}">Logout</a></div></div>
<p><a class="btn btn-primary" href="{{ url_for('admin_product_new') }}">+ New Product</a></p>
<table><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Unit</th><th>Actions</th></tr></thead><tbody>
{% for p in products %}<tr>
<td>{{ p.id }}</td><td>{{ p.name }}</td><td>{{ p.category }}</td><td>₹{{ "%.2f"|format(p.price) }}</td><td>{{ p.unit }}</td>
<td>
  <a class="btn btn-light" href="{{ url_for('admin_product_edit', pid=p.id) }}">Edit</a>
  <form action="{{ url_for('admin_product_delete', pid=p.id) }}" method="post" style="display:inline" onsubmit="return confirm('Delete this product?')">
    <button class="btn btn-danger" type="submit">Delete</button>
  </form>
</td>
</tr>{% endfor %}
</tbody></table>
</div></body></html>
