<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin Login</title>
<style>body{font-family:Arial;background:#f4f4f4;margin:20px}.box{max-width:420px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)}input{width:100%;padding:10px;border:1px solid #ccc;border-radius:4px}button{margin-top:10px;padding:10px 14px;background:#007bff;color:#fff;border:none;border-radius:4px;cursor:pointer}.err{color:#c00}</style></head>
<body><div class="box"><h2>Admin Login</h2>{% if error %}<p class="err">{{ error }}</p>{% endif %}
<form method="post"><label>Password</label><input type="password" name="password" required><button type="submit">Login</button></form>
</div></body></html>
