<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin - Orders</title>
<style>body{font-family:Arial;margin:20px;background:#f4f4f4}.box{max-width:1100px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #eee;text-align:left}.btn{padding:6px 10px;border:none;border-radius:4px;cursor:pointer}.btn-light{background:#eee}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}select{padding:6px}</style></head>
<body><div class="box">
<div class="top"><h2>Orders</h2><div><a class="btn btn-light" href="{{ url_for('admin_home') }}">Products</a> <a class="btn btn-light" href="{{ url_for('admin_logout') }}">Logout</a></div></div>
<table><thead><tr><th>ID</th><th>Customer</th><th>Phone</th><th>Total</th><th>Status</th><th>Placed</th><th>Update</th></tr></thead><tbody>
{% for o in orders %}<tr>
<td><a href="{{ url_for('order_detail', oid=o.id) }}">#{{ o.id }}</a></td>
<td>{{ o.customer_name }}</td><td>{{ o.phone }}</td><td>₹{{ "%.2f"|format(o.total) }}</td><td>{{ o.status }}</td><td>{{ o.created_at }}</td>
<td>
<form action="{{ url_for('admin_order_status', oid=o.id) }}" method="post">
  <select name="status">
    {% for s in ['pending','packed','out_for_delivery','delivered','cancelled'] %}
      <option value="{{ s }}" {% if o.status==s %}selected{% endif %}>{{ s }}</option>
    {% endfor %}
  </select>
  <button class="btn btn-light" type="submit">Save</button>
</form>
</td>
</tr>{% endfor %}
</tbody></table>
</div></body></html>
