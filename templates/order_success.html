<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Order Placed</title>
<style>body{font-family:Arial;margin:20px;background:#f4f4f4}.box{max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)} a{color:#007bff;text-decoration:none}</style></head>
<body><div class="box">
<h1>Thank you! 🎉</h1>
<p>Your order <strong>#{{ order_id }}</strong> has been placed.</p>
<p>Total: <strong>₹{{ "%.2f"|format(total) }}</strong> (Cash on Delivery)</p>
<p><a href="{{ url_for('order_detail', oid=order_id) }}">View order details</a> · <a href="{{ url_for('index') }}">Continue shopping</a></p>
</div></body></html>
