<!DOCTYPE html><html><head><meta charset="UTF-8"><title>{{ 'Edit' if product else 'New' }} Product</title>
<style>body{font-family:Arial;background:#f4f4f4;margin:20px}.box{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1)}label{display:block;margin:10px 0 4px}input,textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:4px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn{padding:10px 14px;border:none;border-radius:4px;cursor:pointer}.btn-primary{background:#007bff;color:#fff}.btn-light{background:#eee}</style></head>
<body><div class="box">
<h2>{{ 'Edit' if product else 'New' }} Product</h2>
<form method="post">
  <label>Name</label><input name="name" required value="{{ product.name if product else '' }}">
  <label>Description</label><textarea name="description" rows="3">{{ product.description if product else '' }}</textarea>
  <div class="row">
    <div><label>Price (₹)</label><input type="number" step="0.01" min="0" name="price" required value="{{ product.price if product else '' }}"></div>
    <div><label>Unit</label><input name="unit" value="{{ product.unit if product else 'pack' }}"></div>
  </div>
  <div class="row">
    <div><label>Image URL</label><input name="image_url" value="{{ product.image_url if product else '' }}"></div>
    <div><label>Category</label><input name="category" value="{{ product.category if product else 'General' }}" placeholder="Fruits, Vegetables, Dairy..."></div>
  </div>
  <div style="margin-top:12px;">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-light" href="{{ url_for('admin_home') }}">Cancel</a>
  </div>
</form>
</div></body></html>
